# Local development database for the Global Vehicle Database.
#
# What this gives you: a Postgres server with the pgvector extension already
# compiled in, configured identically for everyone, started with one command.
#
#   docker compose up -d      # start in the background
#   docker compose ps         # see it running / healthy
#   docker compose down       # stop it (DATA IS KEPT — see volume note below)
#   docker compose down -v    # stop it AND delete all data (fresh start)
#
# Connect from your machine once it's up:
#   psql postgresql://carmanac:carmanac_dev_password@localhost:5432/carmanac
# or with any GUI client using those same credentials on localhost:5432.
#
# Versions are PINNED on purpose. Floating tags like ":latest" would mean a
# random "docker compose pull" could silently upgrade your database engine.
# Pinning is the whole reproducibility point of doing this in Docker.

services:
  db:
    # pgvector 0.8.2 built on Postgres 17. Bump deliberately, never by accident.
    image: pgvector/pgvector:0.8.2-pg17
    container_name: carmanac_postgres
    restart: unless-stopped
    environment:
      # These create the initial superuser + database on FIRST run only.
      # For local dev the password is fine in plain text; production secrets
      # will come from elsewhere (not committed). See .env note below.
      POSTGRES_USER: carmanac
      POSTGRES_PASSWORD: carmanac_dev_password
      POSTGRES_DB: carmanac
      # Keep container logs/timestamps in UTC for consistency across machines.
      TZ: UTC
      PGTZ: UTC
    ports:
      # host:container. If 5432 is already taken on your machine (another
      # Postgres), change ONLY the left number, e.g. "5433:5432", and connect
      # on 5433. The right number is fixed — it's the port inside the container.
      - "5432:5432"
    volumes:
      # Named volume = your data survives "docker compose down" and restarts.
      # It is deleted only by "docker compose down -v".
      - carmanac_pgdata:/var/lib/postgresql/data
      # Anything in this folder runs ONCE, the first time the volume is created.
      # We use it only to enable extensions on a brand-new database. All real
      # schema work happens through Alembic, not here.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Lets "docker compose ps" report healthy, and lets other services (later)
      # wait until the DB is actually accepting connections, not just started.
      test: ["CMD-SHELL", "pg_isready -U carmanac -d carmanac"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  carmanac_pgdata:
